name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore ndb.slnx

      - name: Build
        run: dotnet build ndb.slnx --no-restore -v q

      - name: Unit Tests
        run: |
          dotnet test tests/Ndb.Tests --no-build -v n
          dotnet test tests/Ndb.Dap.Tests --no-build -v n

      - name: Download netcoredbg
        shell: pwsh
        run: |
          $output = dotnet run --project src/Ndb -- setup 2>&1
          Write-Host $output
          # Extract installed path from JSON output
          $json = $output | Where-Object { $_ -match '^\{' } | ConvertFrom-Json
          if ($json.success -and $json.data.path) {
            $path = $json.data.path
            Write-Host "netcoredbg path: $path"
            "NETCOREDBG_PATH=$path" | Out-File -Append $env:GITHUB_ENV
          } else {
            Write-Host "Setup output: $output"
            exit 1
          }

      - name: Integration Tests
        run: dotnet test tests/Ndb.IntegrationTests --no-build -v n -- RunConfiguration.TestSessionTimeout=120000
