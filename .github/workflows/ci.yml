name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore ndb.slnx

      - name: Build
        run: dotnet build ndb.slnx --no-restore -v q

      - name: Unit Tests
        run: |
          dotnet test tests/Ndb.Tests --no-build -v n
          dotnet test tests/Ndb.Dap.Tests --no-build -v n

      - name: Download netcoredbg
        run: |
          dotnet run --project src/Ndb -- setup
        env:
          DOTNET_NOLOGO: true

      - name: Integration Tests
        run: dotnet test tests/Ndb.IntegrationTests --no-build -v n --timeout 120000
        env:
          NETCOREDBG_PATH: ${{ github.workspace }}/src/Ndb/bin/Debug/net10.0/netcoredbg/netcoredbg/netcoredbg.exe
