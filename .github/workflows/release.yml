name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            ext: .zip
          - os: ubuntu-latest
            rid: linux-x64
            ext: .tar.gz
          - os: ubuntu-latest
            rid: linux-arm64
            ext: .tar.gz
          - os: macos-latest
            rid: osx-x64
            ext: .tar.gz
          - os: macos-latest
            rid: osx-arm64
            ext: .tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Publish Native AOT
        run: >
          dotnet publish src/Ndb/Ndb.csproj
          -c Release
          -r ${{ matrix.rid }}
          -o publish/
          /p:PublishAot=true

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path publish/* -DestinationPath ndb-${{ matrix.rid }}.zip

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: tar czf ndb-${{ matrix.rid }}.tar.gz -C publish .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ndb-${{ matrix.rid }}
          path: ndb-${{ matrix.rid }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
